# Configuration Nginx — reverse proxy vers le système de gestion des contraventions
# À placer dans /etc/nginx/sites-available/contraventions puis lier dans sites-enabled/
#
# Note : certbot modifiera automatiquement ce fichier pour ajouter la
# configuration HTTPS (bloc "listen 443 ssl") lors de l'exécution de
# `certbot --nginx -d contraventions.dgecmr.ne` — ne pas s'inquiéter si le
# fichier change après cette étape, c'est le fonctionnement normal.

server {
    listen 80;
    server_name contraventions.dgecmr.ne;

    # Taille max du corps de requête (photos de preuve en base64 avant écriture disque)
    client_max_body_size 10M;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
